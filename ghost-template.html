<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{subject}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      .email-bg { background-color: #0A0A0A !important; }
      .card-bg { background-color: #111111 !important; }
    }

    /* Mobile */
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; max-width: 100% !important; }
      .fluid { width: 100% !important; max-width: 100% !important; height: auto !important; }
      .stack-column { display: block !important; width: 100% !important; }
      .mobile-pad { padding-left: 24px !important; padding-right: 24px !important; }
    }

    /* Ghost content styles */
    .post-content h2 { color: #FAFAFA; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 22px; font-weight: 300; letter-spacing: -0.02em; margin: 32px 0 12px 0; }
    .post-content h3 { color: #FAFAFA; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 400; letter-spacing: -0.01em; margin: 28px 0 10px 0; }
    .post-content p { color: #A0A0A0; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.7; margin: 0 0 16px 0; }
    .post-content a { color: #C4A265; text-decoration: none; }
    .post-content a:hover { text-decoration: underline; }
    .post-content blockquote { border-left: 2px solid #C4A265; margin: 24px 0; padding: 4px 0 4px 20px; }
    .post-content blockquote p { color: #D0D0D0; font-style: italic; }
    .post-content ul, .post-content ol { color: #A0A0A0; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.7; padding-left: 20px; margin: 0 0 16px 0; }
    .post-content li { margin-bottom: 6px; }
    .post-content hr { border: none; border-top: 1px solid #1A1A1A; margin: 32px 0; }
    .post-content img { max-width: 100%; height: auto; border-radius: 2px; margin: 16px 0; }
    .post-content code { background: #1A1A1A; color: #C4A265; font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 13px; padding: 2px 6px; border-radius: 2px; }
    .post-content pre { background: #1A1A1A; border-radius: 2px; padding: 16px; margin: 16px 0; overflow-x: auto; }
    .post-content pre code { background: none; padding: 0; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #0A0A0A;">
  <center>

    <!-- Preheader (hidden preview text) -->
    <div style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all;">
      {{preheader}}
    </div>

    <!-- Email wrapper -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #0A0A0A;" class="email-bg">
      <tr>
        <td style="padding: 40px 0;">

          <!-- Email container -->
          <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center" class="email-container" style="margin: 0 auto;">

            <!-- Header: Monogram -->
            <tr>
              <td align="center" style="padding: 0 40px 32px 40px;" class="mobile-pad">
                <a href="https://omarbakri.com" style="text-decoration: none;">
                  <svg width="34" height="45" viewBox="0 0 150 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="75" cy="100" rx="64" ry="90" stroke="#C4A265" stroke-width="3" fill="none"/>
                    <text x="75" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="78" font-weight="400" fill="#C4A265">A</text>
                    <line x1="38" y1="102" x2="112" y2="102" stroke="#C4A265" stroke-width="2"/>
                    <text x="75" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="78" font-weight="400" fill="#C4A265">B</text>
                  </svg>
                </a>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding: 0 40px;" class="mobile-pad">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr><td style="border-top: 1px solid #1A1A1A; font-size: 0; line-height: 0;">&nbsp;</td></tr>
                </table>
              </td>
            </tr>

            <!-- Post title -->
            <tr>
              <td style="padding: 32px 40px 8px 40px;" class="mobile-pad">
                <h1 style="margin: 0; color: #FAFAFA; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 28px; font-weight: 300; letter-spacing: -0.02em; line-height: 1.3;">
                  {{post_title}}
                </h1>
              </td>
            </tr>

            <!-- Date + reading time -->
            <tr>
              <td style="padding: 8px 40px 32px 40px;" class="mobile-pad">
                <p style="margin: 0; color: #666666; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase;">
                  {{date}} &middot; {{reading_time}}
                </p>
              </td>
            </tr>

            <!-- Feature image (optional) -->
            {{#if feature_image}}
            <tr>
              <td style="padding: 0 40px 32px 40px;" class="mobile-pad">
                <img src="{{feature_image}}" width="520" alt="{{post_title}}" style="width: 100%; max-width: 520px; height: auto; display: block; border-radius: 2px;" class="fluid">
              </td>
            </tr>
            {{/if}}

            <!-- Post body -->
            <tr>
              <td style="padding: 0 40px;" class="mobile-pad">
                <div class="post-content">
                  {{{body}}}
                </div>
              </td>
            </tr>

            <!-- CTA: Read on web -->
            <tr>
              <td style="padding: 32px 40px;" class="mobile-pad">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                  <tr>
                    <td style="border: 1px solid #C4A265; padding: 12px 28px;">
                      <a href="{{post_url}}" style="color: #C4A265; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; text-decoration: none; letter-spacing: 0.03em;">
                        Read on web &rarr;
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding: 16px 40px;" class="mobile-pad">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr><td style="border-top: 1px solid #1A1A1A; font-size: 0; line-height: 0;">&nbsp;</td></tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding: 24px 40px 16px 40px;" class="mobile-pad">
                <p style="margin: 0 0 4px 0; color: #FAFAFA; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 300;">
                  Omar Al-Bakri
                </p>
                <p style="margin: 0; color: #666666; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px;">
                  FinTech &middot; AI Strategy &middot; Business Development
                </p>
              </td>
            </tr>

            <!-- Social links -->
            <tr>
              <td style="padding: 12px 40px;" class="mobile-pad">
                <a href="https://omarbakri.com" style="color: #666666; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; text-decoration: none; margin-right: 16px;">omarbakri.com</a>
                <a href="https://linkedin.com/in/omaralbakri" style="color: #666666; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; text-decoration: none; margin-right: 16px;">LinkedIn</a>
                <a href="https://intelligentrails.news" style="color: #666666; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; text-decoration: none;">Newsletter</a>
              </td>
            </tr>

            <!-- Unsubscribe -->
            <tr>
              <td style="padding: 24px 40px 0 40px;" class="mobile-pad">
                <p style="margin: 0; color: #444444; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; line-height: 1.6;">
                  You received this because you subscribed to Intelligent Rails.
                  <a href="{{unsubscribe_url}}" style="color: #666666; text-decoration: underline;">Unsubscribe</a>
                </p>
              </td>
            </tr>

          </table>
          <!-- /Email container -->

        </td>
      </tr>
    </table>
    <!-- /Email wrapper -->

  </center>
</body>
</html>
